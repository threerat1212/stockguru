services:
  - type: web
    name: stockguru-web
    env: node
    plan: standard
    buildCommand: npm run build
    startCommand: npm start
    preDeployCommand: |
      echo "Seeding initial news articles..."
      curl -X POST "https://$RENDER_EXTERNAL_HOSTNAME/api/news/seed" \
        -H "Authorization: Bearer $CRON_SECRET" \
        -H "Content-Type: application/json" || echo "Seed skipped (already seeded or not ready)"
    envVars:
      - key: NODE_ENV
        value: production
      - key: MIMO_API_KEY
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: CRON_SECRET
        generateValue: true

cronJobs:
  - type: cron
    name: stockguru-news-refresh
    schedule: "*/30 * * * *"
    env: node
    plan: starter
    buildCommand: ""
    startCommand: |
      curl -X POST "https://$RENDER_EXTERNAL_HOSTNAME/api/news/refresh" \
        -H "Authorization: Bearer $CRON_SECRET" \
        -H "Content-Type: application/json"
