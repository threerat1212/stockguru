services:
  - type: web
    name: stockguru-web
    runtime: node
    plan: standard
    healthCheckPath: /api/health
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    preDeployCommand: |
      echo "Seeding initial news articles..."
      curl -X POST "https://$RENDER_EXTERNAL_HOSTNAME/api/news/seed" \
        -H "Authorization: Bearer $CRON_SECRET" \
        -H "Content-Type: application/json" || echo "Seed skipped (already seeded or not ready)"
    envVars:
      - key: NODE_ENV
        value: production
      - key: MIMO_API_KEY
        sync: false
      - key: MIMO_BASE_URL
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
      - key: STRIPE_PRICE_FOUNDING_PRO
        sync: false
      - key: STRIPE_PRICE_TRADER
        sync: false
      - key: CRON_SECRET
        generateValue: true
      - key: RESEND_API_KEY
        sync: false
      - key: RENDER_EXTERNAL_HOSTNAME
        fromService:
          type: web
          name: stockguru-web
          property: host

  - type: cron
    name: stockguru-news-refresh
    runtime: node
    schedule: "*/30 * * * *"
    plan: starter
    buildCommand: ""
    startCommand: |
      curl -X POST "https://$RENDER_EXTERNAL_HOSTNAME/api/news/refresh" \
        -H "Authorization: Bearer $CRON_SECRET" \
        -H "Content-Type: application/json"
    envVars:
      - key: CRON_SECRET
        fromService:
          type: web
          name: stockguru-web
          envVarKey: CRON_SECRET
      - key: RENDER_EXTERNAL_HOSTNAME
        fromService:
          type: web
          name: stockguru-web
          property: host

  - type: cron
    name: stockguru-alerts-check
    runtime: node
    schedule: "*/5 * * * *"
    plan: starter
    buildCommand: ""
    startCommand: |
      curl -X POST "https://$RENDER_EXTERNAL_HOSTNAME/api/alerts/check" \
        -H "Authorization: Bearer $CRON_SECRET" \
        -H "Content-Type: application/json"
    envVars:
      - key: CRON_SECRET
        fromService:
          type: web
          name: stockguru-web
          envVarKey: CRON_SECRET
      - key: RENDER_EXTERNAL_HOSTNAME
        fromService:
          type: web
          name: stockguru-web
          property: host
