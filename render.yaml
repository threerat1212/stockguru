services:
  - type: web
    name: stockguru-web
    runtime: node
    plan: standard
    healthCheckPath: /api/health
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    preDeployCommand: |
      echo "Seeding initial news articles..."
      curl -X POST "https://$RENDER_EXTERNAL_HOSTNAME/api/news/seed" \
        -H "Authorization: Bearer $CRON_SECRET" \
        -H "Content-Type: application/json" || echo "Seed skipped (already seeded or not ready)"
    envVars:
      - key: NODE_ENV
        value: production
      - key: MIMO_API_KEY
        sync: false
      - key: MIMO_BASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        value: https://stockguru-web.onrender.com
      - key: NEXT_PUBLIC_VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
      - key: STRIPE_PRICE_FOUNDING_PRO
        sync: false
      - key: STRIPE_PRICE_TRADER
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: AGENT_LOOP_STRICT_VERIFIER
        value: "true"
      - key: RESEND_API_KEY
        sync: false
      - key: RENDER_EXTERNAL_HOSTNAME
        fromService:
          type: web
          name: stockguru-web
          property: host

  - type: cron
    name: stockguru-data-fetch
    runtime: node
    schedule: "*/30 * * * *"
    plan: starter
    region: singapore
    buildCommand: ""
    startCommand: node scripts/fetch-data.js
    envVars:
      - key: CRON_SECRET
        sync: false
      - key: RENDER_EXTERNAL_HOSTNAME
        value: stockguru-web.onrender.com

  - type: cron
    name: stockguru-news-refresh
    runtime: node
    schedule: "*/30 * * * *"
    plan: starter
    region: singapore
    buildCommand: ""
    startCommand: node scripts/refresh-news.js
    envVars:
      - key: CRON_SECRET
        sync: false
      - key: RENDER_EXTERNAL_HOSTNAME
        value: stockguru-web.onrender.com

  - type: cron
    name: stockguru-alerts-check
    runtime: node
    schedule: "*/5 * * * *"
    plan: starter
    region: singapore
    buildCommand: ""
    startCommand: node scripts/check-alerts.js
    envVars:
      - key: CRON_SECRET
        sync: false
      - key: NEXT_PUBLIC_VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: RENDER_EXTERNAL_HOSTNAME
        value: stockguru-web.onrender.com
